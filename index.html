<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classed Headings Page</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        /* Styling based on the new class names */
        .section-title {
            color: #2c3e50;
            border-left: 5px solid #3498db;
            padding-left: 15px;
        }

        .category-header {
            color: #e67e22;
            text-transform: uppercase;
            font-size: 1.2rem;
        }

        .tech-heading {
            color: #27ae60;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>Main Page Title</h1>

    <section>
        <h2 class="section-title">Introduction to Lists</h2>
        <ul>
            <li>Item A</li>
            <li>Item B</li>
        </ul>
    </section>

    <section>
        <h2 class="category-header">Shopping Category</h2>
        <ol>
            <li>Milk</li>
            <li>Bread</li>
        </ol>
    </section>

    <section>
        <h2 class="tech-heading">Technical Specifications</h2>
        <ul>
            <li>Resolution: 1080p</li>
            <li>Refresh Rate: 120Hz</li>
        </ul>
    </section>

</body>
</html>
